AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PolicyGraph AI 2.0 - Backend
Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        BUCKET_NAME:
          Ref: PolicyDocsBucket
        REGION: ap-south-1
Resources:
  PolicyDocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: policygraph-ai-docs-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          AllowedOrigins:
          - '*'
          MaxAge: 3000
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: PolicyGraphAIPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            Resource:
              Fn::Sub: arn:aws:s3:::policygraph-ai-docs-${AWS::AccountId}/*
          - Effect: Allow
            Action:
            - textract:DetectDocumentText
            - textract:AnalyzeDocument
            Resource: '*'
          - Effect: Allow
            Action:
            - bedrock:InvokeModel
            Resource: arn:aws:bedrock:ap-south-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
  PolicyGraphAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: '''GET,POST,OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization'''
        AllowOrigin: '''*'''
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: policygraph-get-upload-url
      CodeUri: GetUploadUrlFunction
      Handler: lambda_function.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: PolicyGraphAPI
            Path: /upload-url
            Method: GET
    Metadata:
      SamResourceId: GetUploadUrlFunction
  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: policygraph-analyze
      CodeUri: AnalyzeFunction
      Handler: lambda_function.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Timeout: 120
      MemorySize: 1024
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: PolicyGraphAPI
            Path: /analyze
            Method: POST
    Metadata:
      SamResourceId: AnalyzeFunction
  EligibilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: policygraph-eligibility
      CodeUri: EligibilityFunction
      Handler: lambda_function.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: PolicyGraphAPI
            Path: /eligibility
            Method: POST
    Metadata:
      SamResourceId: EligibilityFunction
  ConflictsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: policygraph-conflicts
      CodeUri: ConflictsFunction
      Handler: lambda_function.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: PolicyGraphAPI
            Path: /conflicts
            Method: POST
    Metadata:
      SamResourceId: ConflictsFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${PolicyGraphAPI}.execute-api.ap-south-1.amazonaws.com/prod
  BucketName:
    Description: S3 Bucket for policy documents
    Value:
      Ref: PolicyDocsBucket
